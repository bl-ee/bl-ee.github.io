project:
  type: website
  output-dir: _site

website:
  title: "Brian W. Lee"
  site-url: "https://bl-ee.github.io"
  description: "Brian W. Lee's research homepage and notes."

  navbar:
    title: "Brian W. Lee"
    background: white
    foreground: "#777777"
    right:
      - href: index.qmd#research
        text: "Research"
      - href: notes/index.qmd
        text: "Notes"

  search: false
  open-graph: true

format:
  html:
    theme: cosmo
    css: style.css
    html-math-method: mathjax
    toc: true
    toc-depth: 3
    title-block-style: plain
    anchor-sections: true
    code-copy: true
    code-overflow: wrap
    grid:
      body-width: 640px

execute:
  freeze: auto
